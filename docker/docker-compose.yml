services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["streamlit", "run", "frontend/streamlit_app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    depends_on:
      - api
    volumes:
      - ../data:/app/data

